<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>果了个果</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ========== 游戏容器 ========== -->
  <div class="game-container">

    <div class="header-row">
      <h1 class="game-title">🍎 果了个果</h1>
      <div class="level-badge" id="levelBadge">第 1 / 3 关</div>
    </div>

    <div class="collect-bar">
      <span class="collect-label">收集：</span>
      <div class="collect-slots">
        <div class="collect-slot" id="collectSlot0"></div>
        <div class="collect-slot" id="collectSlot1"></div>
        <div class="collect-slot" id="collectSlot2"></div>
      </div>
    </div>

    <div id="board" class="board"></div>

    <div class="slot-area">
      <div id="slotBar" class="slot-bar">
        <div class="slot-placeholder"></div>
        <div class="slot-placeholder"></div>
        <div class="slot-placeholder"></div>
        <div class="slot-placeholder"></div>
        <div class="slot-placeholder"></div>
        <div class="slot-placeholder"></div>
        <div class="slot-placeholder"></div>
      </div>
    </div>

    <div class="status-bar">
      剩余：<span id="remainCount">0</span> 张
    </div>
  </div>

  <!-- ========== 通关惊喜遮罩层 ========== -->
  <div id="winOverlay" class="win-overlay hidden">
    <div class="win-content">

      <div id="surpriseDigits" class="surprise-digits"></div>

      <!-- 🎂 CSS 蛋糕 -->
      <div id="surpriseCake" class="cake-scene hidden">
        <div class="cake-plate"></div>
        <div class="cake-body">
          <div class="cake-layer cake-layer-1">
            <div class="cream-drip"></div>
          </div>
          <div class="cake-layer cake-layer-2">
            <div class="cream-drip"></div>
          </div>
          <div class="cake-layer cake-layer-3">
            <div class="cream-drip"></div>
            <div class="sprinkles">
              <div class="sprinkle"></div><div class="sprinkle"></div>
              <div class="sprinkle"></div><div class="sprinkle"></div>
              <div class="sprinkle"></div><div class="sprinkle"></div>
              <div class="sprinkle"></div><div class="sprinkle"></div>
              <div class="sprinkle"></div><div class="sprinkle"></div>
            </div>
          </div>
        </div>
        <div class="candles" id="candles">
          <div class="candle">
            <div class="flame" id="flame0"><div class="flame-glow"></div></div>
            <div class="wick"></div>
          </div>
          <div class="candle">
            <div class="flame" id="flame1"><div class="flame-glow"></div></div>
            <div class="wick"></div>
          </div>
          <div class="candle">
            <div class="flame" id="flame2"><div class="flame-glow"></div></div>
            <div class="wick"></div>
          </div>
          <div class="candle">
            <div class="flame" id="flame3"><div class="flame-glow"></div></div>
            <div class="wick"></div>
          </div>
        </div>
      </div>

      <button id="blowBtn" class="blow-btn hidden">
        🔥 长按吹灭蜡烛
      </button>

      <div id="surpriseText" class="surprise-text hidden">
        亲爱的姐姐，生日快乐！🎉<br>
        <span class="sub-text">6月22日 · 永远开心</span>
      </div>

      <button id="replayBtn" class="replay-btn hidden">🔄 再玩一次</button>

      <!-- 秘密空间 -->
      <button id="secretBtn" class="secret-btn hidden">🧧 秘密空间</button>
    </div>
  </div>

  <!-- ========== 红包弹窗 ========== -->
  <div id="redpackOverlay" class="redpack-overlay hidden">
    <div class="redpack-container">
      <!-- 红包主体 -->
      <div id="redpackEnvelope" class="redpack-envelope">
        <div class="redpack-flap">
          <div class="redpack-flap-inner">
            <div class="redpack-gold-circle"></div>
          </div>
        </div>
        <div class="redpack-body">
          <div class="redpack-body-inner">
            <div class="redpack-border-box">
              <span class="redpack-char">開</span>
            </div>
          </div>
        </div>
        <div class="redpack-gold-stripe top-stripe"></div>
        <div class="redpack-gold-stripe bottom-stripe"></div>
      </div>

      <!-- 点击提示 -->
      <p id="redpackHint" class="redpack-hint">👆 点我拆红包</p>

      <!-- 拆开后的内容 -->
      <div id="redpackResult" class="redpack-result hidden">
        <div class="result-amount">
          <span class="amount-symbol">¥</span>
          <span class="amount-number" id="amountNumber">188.88</span>
        </div>
        <p class="result-msg">姐姐生日快乐！<br>愿所有美好如期而至 💕</p>
        <p class="result-hint">微信红包已发出，记得查收哦～</p>
        <button id="redpackCloseBtn" class="redpack-close-btn">🎉 太开心啦</button>
      </div>
    </div>

    <!-- 金币粒子容器 -->
    <div id="coinContainer" class="coin-container"></div>
  </div>

  <!-- ========== 关卡过渡遮罩 ========== -->
  <div id="levelOverlay" class="level-overlay hidden">
    <div class="level-digit" id="levelDigit"></div>
    <div class="level-hint" id="levelHint"></div>
  </div>

  <script src="js/audio.js"></script>
  <script src="js/game.js"></script>
  <script src="js/surprise.js"></script>
</body>
</html>
